    <script>
(function() {
  try {
    // ?theme=dark|light forces a theme for this load only (no persistence) —
    // useful for sharing links in a fixed theme and for automated screenshots.
    var qp = new URLSearchParams(location.search).get('theme');
    var ls = localStorage.getItem('tld-theme');
    var mq = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)');
    var sysKnown = !!(mq && (mq.media === '(prefers-color-scheme: dark)'));
    var dark = (qp === 'dark' || qp === 'light')
      ? qp === 'dark'
      : ls ? ls === 'dark' : (sysKnown ? mq.matches : true);
    if (dark) document.documentElement.classList.add('dark');
  } catch (e) {}
})();
    </script>
